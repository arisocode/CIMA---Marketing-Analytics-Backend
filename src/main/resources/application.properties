# Spring Boot application configuration
spring.application.name=crm-marketing
server.port=${PORT:3003}

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:crm_database}?currentSchema=${DB_SCHEMA:schema_marketing}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CRM base URL for client and project sync
crm.base.url=${CRM_BASE_URL:http://localhost:8080}
